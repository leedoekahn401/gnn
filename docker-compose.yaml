version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j_db
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt protocol
    environment:
      # Sets the initial password (must be at least 8 characters)
      - NEO4J_AUTH=neo4j/password123
      # Optional: Enable APOC plugins for advanced graph features
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  app:
    build: .
    container_name: mesa_simulation
    depends_on:
      - neo4j
    environment:
      # Your app connects to 'neo4j' service name instead of 'localhost'
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123

volumes:
  neo4j_data:
  neo4j_logs:
